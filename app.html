<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos y Recordatorios - App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: { 50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4', 400: '#a3a3a3', 500: '#737373', 600: '#525252', 700: '#404040', 800: '#262626', 900: '#171717' },
            blue: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
            green: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' },
            orange: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' },
            purple: { 50: '#faf5ff', 100: '#f3e8ff', 500: '#a855f7', 600: '#9333ea', 700: '#7e22ce' },
            yellow: { 50: '#fefce8', 100: '#fef9c3', 500: '#eab308', 600: '#ca8a04', 700: '#a16207' },
            red: { 50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2626', 700: '#b91c1c' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          boxShadow: { card: '0 0 0 1px rgb(0 0 0 / 0.05), 0 1px 2px 0 rgb(0 0 0 / 0.05)', 'card-hover': '0 0 0 1px rgb(0 0 0 / 0.05), 0 4px 8px 0 rgb(0 0 0 / 0.08)' }
        }
      }
    }
  </script>
  <style>body{font-family:Inter,system-ui,sans-serif}.animate-spin{animation:spin 1s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // CATEGORIES CONFIG
    const CATEGORIES = {
      servicios: { label: 'Servicios', icon: '⚡', bgClass: 'bg-blue-50', textClass: 'text-blue-700', borderClass: 'border-blue-200' },
      expensas: { label: 'Expensas', icon: '🏢', bgClass: 'bg-green-50', textClass: 'text-green-700', borderClass: 'border-green-200' },
      honorarios: { label: 'Honorarios', icon: '💼', bgClass: 'bg-orange-50', textClass: 'text-orange-700', borderClass: 'border-orange-200' },
      impuestos: { label: 'Impuestos', icon: '📋', bgClass: 'bg-purple-50', textClass: 'text-purple-700', borderClass: 'border-purple-200' },
      tramites: { label: 'Trámites', icon: '📄', bgClass: 'bg-yellow-50', textClass: 'text-yellow-700', borderClass: 'border-yellow-200' },
      otros: { label: 'Otros', icon: '📌', bgClass: 'bg-gray-100', textClass: 'text-gray-700', borderClass: 'border-gray-300' }
    };

    const RESPONSIBLES = ['Spirit Mariscal', 'Nora', 'Orestes', 'Abraham'];

    // LOCAL STORAGE HOOK
    function useLocalPayments() {
      const [payments, setPayments] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const stored = localStorage.getItem('payments-data');
        if (stored) {
          setPayments(JSON.parse(stored));
        } else {
          const defaultPayments = [
            { id: '1', name: 'Luz (ANDE)', amount: 450000, category: 'servicios', responsible: 'Abraham', due_date: new Date(Date.now() + 2*86400000).toISOString().split('T')[0], notes: 'Factura mensual', icon: '⚡', is_paid: false, created_at: new Date().toISOString() },
            { id: '2', name: 'Expensas Edificio', amount: 850000, category: 'expensas', responsible: 'Nora', due_date: new Date(Date.now() + 5*86400000).toISOString().split('T')[0], notes: null, icon: '🏢', is_paid: false, created_at: new Date().toISOString() },
            { id: '3', name: 'Honorarios Contador', amount: 1200000, category: 'honorarios', responsible: 'Abraham', due_date: new Date(Date.now() - 3*86400000).toISOString().split('T')[0], notes: 'Servicios contables', icon: '💼', is_paid: true, paid_at: new Date().toISOString(), created_at: new Date().toISOString() },
            { id: '4', name: 'IVA Mensual', amount: 3500000, category: 'impuestos', responsible: 'Orestes', due_date: new Date(Date.now() + 10*86400000).toISOString().split('T')[0], notes: 'Declaración IVA', icon: '📋', is_paid: false, created_at: new Date().toISOString() },
            { id: '5', name: 'Patente Vehículo', amount: 180000, category: 'tramites', responsible: 'Spirit Mariscal', due_date: new Date(Date.now() + 1*86400000).toISOString().split('T')[0], notes: null, icon: '📄', is_paid: false, created_at: new Date().toISOString() },
            { id: '6', name: 'Mantenimiento Aire', amount: 320000, category: 'otros', responsible: null, due_date: new Date(Date.now() + 14*86400000).toISOString().split('T')[0], notes: 'Limpieza', icon: '❄️', is_paid: false, created_at: new Date().toISOString() }
          ];
          setPayments(defaultPayments);
          localStorage.setItem('payments-data', JSON.stringify(defaultPayments));
        }
        setLoading(false);
      }, []);

      const savePayments = (newPayments) => {
        setPayments(newPayments);
        localStorage.setItem('payments-data', JSON.stringify(newPayments));
      };

      const createPayment = (data) => {
        const newPayment = { ...data, id: Date.now().toString(), created_at: new Date().toISOString(), is_paid: false, paid_at: null };
        savePayments([...payments, newPayment]);
      };

      const updatePayment = (id, data) => {
        savePayments(payments.map(p => p.id === id ? { ...p, ...data } : p));
      };

      const deletePayment = (id) => {
        savePayments(payments.filter(p => p.id !== id));
      };

      const togglePaid = (payment) => {
        updatePayment(payment.id, { is_paid: !payment.is_paid, paid_at: !payment.is_paid ? new Date().toISOString() : null });
      };

      return { payments, loading, createPayment, updatePayment, deletePayment, togglePaid };
    }

    // COMPONENTS
    function Button({ children, variant = 'primary', size = 'md', onClick, className = '' }) {
      const variants = {
        primary: 'bg-gray-900 text-white hover:bg-gray-800',
        secondary: 'bg-white text-gray-900 border border-gray-200 hover:bg-gray-50',
        ghost: 'text-gray-600 hover:bg-gray-100',
        danger: 'bg-red-600 text-white hover:bg-red-700'
      };
      const sizes = { sm: 'h-8 px-3 text-xs', md: 'h-9 px-4 text-sm' };
      return (
        <button onClick={onClick} className={`inline-flex items-center justify-center gap-2 font-medium rounded-md transition-colors ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function CategoryBadge({ category }) {
      const config = CATEGORIES[category];
      return (
        <span className={`inline-flex items-center gap-1.5 rounded-md border font-medium px-2 py-1 text-xs ${config.bgClass} ${config.textClass} ${config.borderClass}`}>
          <span>{config.icon}</span><span>{config.label}</span>
        </span>
      );
    }

    function DueDateBadge({ date, isPaid }) {
      const due = new Date(date);
      const today = new Date();
      const daysUntil = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
      const isOverdue = daysUntil < 0 && !isPaid;
      
      let style = { bg: 'bg-gray-100', text: 'text-gray-600', border: 'border-gray-200', icon: '◷' };
      if (isPaid) style = { bg: 'bg-green-50', text: 'text-green-700', border: 'border-green-200', icon: '✓' };
      else if (isOverdue) style = { bg: 'bg-red-50', text: 'text-red-700', border: 'border-red-200', icon: '!' };
      else if (daysUntil <= 3) style = { bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-200', icon: '⚠' };
      else if (daysUntil <= 7) style = { bg: 'bg-yellow-50', text: 'text-yellow-700', border: 'border-yellow-200', icon: '◷' };

      return (
        <span className={`inline-flex items-center gap-1.5 px-2 py-1 rounded-md border text-xs font-medium ${style.bg} ${style.text} ${style.border}`}>
          <span>{style.icon}</span>
          <span>{date.split('-').reverse().join('/')}</span>
          {!isPaid && daysUntil >= 0 && <span className="opacity-75">({daysUntil === 0 ? 'hoy' : daysUntil + 'd'})</span>}
        </span>
      );
    }

    function PaymentCard({ payment, onEdit, onDelete, onTogglePaid }) {
      return (
        <div className={`group rounded-lg border p-4 transition-all duration-200 hover:border-gray-300 hover:shadow-card-hover ${payment.is_paid ? 'bg-gray-50' : 'bg-white'}`}>
          <div className="flex items-start justify-between gap-3">
            <div className="flex items-start gap-3 flex-1 min-w-0">
              <span className="text-2xl flex-shrink-0">{payment.icon}</span>
              <div className="flex-1 min-w-0">
                <h3 className={`font-medium text-base truncate ${payment.is_paid ? 'text-gray-600 line-through' : 'text-gray-900'}`}>{payment.name}</h3>
                {payment.responsible && <p className="text-sm text-gray-600 mt-0.5">{payment.responsible}</p>}
              </div>
            </div>
            <div className="flex items-start gap-3">
              {payment.amount && <p className={`font-semibold text-lg ${payment.is_paid ? 'text-gray-400' : 'text-gray-900'}`}>${payment.amount.toLocaleString('es-PY')}</p>}
              <div className="opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1">
                <button onClick={onEdit} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100">✏️</button>
                <button onClick={onDelete} className="p-1.5 rounded text-gray-400 hover:text-red-600 hover:bg-red-50">🗑️</button>
              </div>
            </div>
          </div>
          <div className="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
            <div className="flex items-center gap-2">
              <CategoryBadge category={payment.category} />
              {payment.due_date && <DueDateBadge date={payment.due_date} isPaid={payment.is_paid} />}
            </div>
            <label className="inline-flex items-center gap-2 cursor-pointer">
              <input type="checkbox" checked={payment.is_paid} onChange={onTogglePaid} className="w-4 h-4 rounded border-gray-300" />
              <span className="text-sm text-gray-700">{payment.is_paid ? 'Pagado' : 'Pendiente'}</span>
            </label>
          </div>
          {payment.notes && <div className="mt-3 p-2 bg-gray-50 rounded text-sm text-gray-600">{payment.notes}</div>}
        </div>
      );
    }

    function PaymentForm({ initialData, onSubmit, onCancel }) {
      const [form, setForm] = useState(initialData || { name: '', amount: '', category: 'otros', responsible: '', due_date: '', notes: '', icon: '💰' });

      const handleSubmit = (e) => {
        e.preventDefault();
        onSubmit({ ...form, amount: form.amount ? parseFloat(form.amount) : null });
      };

      return (
        <form onSubmit={handleSubmit} className="space-y-4 bg-white rounded-lg border border-gray-200 p-4">
          <h2 className="text-lg font-medium text-gray-900">{initialData ? 'Editar' : 'Crear'} pago</h2>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
            <input required value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full h-9 px-3 text-sm bg-white border border-gray-200 rounded-md focus:border-blue-500 focus:ring-2 focus:ring-blue-100" />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Monto</label>
            <input type="number" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} className="w-full h-9 px-3 text-sm bg-white border border-gray-200 rounded-md focus:border-blue-500 focus:ring-2 focus:ring-blue-100" />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
            <select value={form.category} onChange={e => setForm({...form, category: e.target.value})} className="w-full h-9 px-3 text-sm bg-white border border-gray-200 rounded-md">
              {Object.entries(CATEGORIES).map(([key, conf]) => <option key={key} value={key}>{conf.icon} {conf.label}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Responsable</label>
            <select value={form.responsible} onChange={e => setForm({...form, responsible: e.target.value || null})} className="w-full h-9 px-3 text-sm bg-white border border-gray-200 rounded-md">
              <option value="">Sin responsable</option>
              {RESPONSIBLES.map(r => <option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Fecha vencimiento</label>
            <input type="date" value={form.due_date} onChange={e => setForm({...form, due_date: e.target.value || null})} className="w-full h-9 px-3 text-sm bg-white border border-gray-200 rounded-md" />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Icono</label>
            <div className="flex gap-2">
              {['💰','⚡','🏢','💼','📋','📄','📌','💳','🏠','🚗','💡','📱','❄️'].map(emoji => (
                <label key={emoji} className="cursor-pointer text-2xl p-2 rounded hover:bg-gray-100">
                  <input type="radio" name="icon" value={emoji} checked={form.icon === emoji} onChange={e => setForm({...form, icon: e.target.value})} className="sr-only" />
                  {emoji}
                </label>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Notas</label>
            <textarea value={form.notes || ''} onChange={e => setForm({...form, notes: e.target.value || null})} rows={2} className="w-full px-3 py-2 text-sm bg-white border border-gray-200 rounded-md resize-none" />
          </div>
          <div className="flex gap-2">
            <Button type="submit" className="flex-1">{initialData ? 'Guardar' : 'Crear'}</Button>
            <Button variant="secondary" onClick={onCancel}>Cancelar</Button>
          </div>
        </form>
      );
    }

    // MAIN APP
    function App() {
      const { payments, loading, createPayment, updatePayment, deletePayment, togglePaid } = useLocalPayments();
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);

      const handleReset = () => {
        if (confirm('¿Restaurar datos de ejemplo?')) {
          localStorage.removeItem('payments-data');
          window.location.reload();
        }
      };

      if (loading) return <div className="flex items-center justify-center min-h-screen"><div className="animate-spin rounded-full h-8 w-8 border-2 border-gray-200 border-t-gray-900"></div></div>;

      return (
        <div className="min-h-screen bg-gray-50">
          <header className="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-gray-200">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-center justify-between h-14">
                <div className="flex items-center gap-3">
                  <h1 className="text-lg font-semibold text-gray-900">💰 Pagos y Recordatorios</h1>
                  <span className="px-2 py-1 bg-green-100 text-green-700 text-xs font-medium rounded-full">Local</span>
                </div>
                <div className="flex gap-2">
                  <Button variant="ghost" size="sm" onClick={handleReset}>🔄 Reset</Button>
                  {!showForm && !editing && <Button size="sm" onClick={() => setShowForm(true)}>Nuevo Pago</Button>}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div className="mb-6 bg-blue-50 border border-blue-200 rounded-lg p-4">
              <p className="text-sm text-blue-700">
                <strong>Modo Local:</strong> Los datos se guardan en tu navegador. Podés crear, editar, eliminar y marcar pagos. Los datos persisten al recargar.
              </p>
            </div>

            {showForm && <PaymentForm onSubmit={(data) => { createPayment(data); setShowForm(false); }} onCancel={() => setShowForm(false)} />}
            
            {editing && <PaymentForm initialData={editing} onSubmit={(data) => { updatePayment(editing.id, data); setEditing(null); }} onCancel={() => setEditing(null)} />}

            <div className="space-y-3 mt-6">
              {payments.length === 0 ? (
                <div className="text-center py-12">
                  <div className="text-4xl mb-3">📭</div>
                  <h3 className="text-base font-medium text-gray-900 mb-1">No hay pagos</h3>
                  <p className="text-sm text-gray-600 mb-4">Creá tu primer pago para comenzar</p>
                  <Button onClick={() => setShowForm(true)}>Crear Pago</Button>
                </div>
              ) : (
                payments.map(payment => (
                  <PaymentCard 
                    key={payment.id} 
                    payment={payment} 
                    onEdit={() => setEditing(payment)}
                    onDelete={() => confirm(`¿Eliminar "${payment.name}"?`) && deletePayment(payment.id)}
                    onTogglePaid={() => togglePaid(payment)}
                  />
                ))
              )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
